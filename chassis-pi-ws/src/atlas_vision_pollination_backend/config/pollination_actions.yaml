# 视觉授粉动作配置
# 本文件由 atlas_vision_pollination_backend 读取
# mission_route.yaml 中的 arrival_jobs 会引用这里的 prepare_action 和 task 名称
# prepare_actions 用于配置各个作业窗口的预识别关节位姿
# arrival_tasks 用于配置到点后的视觉识别数量和逐朵授粉序列
# 所有关节角单位都是 rad
# 工具点偏移单位都是 m
# 每次实车调参建议只改一个点位或一个动作，便于定位问题

prepare_actions:
  # 空动作
  # 用于 PASS_BY 点或只验证导航的点
  noop:
    type: "noop"

  # 点位 02 的左侧预识别窗口
  # 总任务会先执行该动作，让相机进入可识别视角
  pre_detect_nav_02_left:
    type: "joints"
    joints_rad: [1.601, 2.132, 5.458, 2.359, 3.141]
    speed_rad_s: 3.14
    timeout_s: 8.0

  # 点位 02 的右侧预识别窗口
  # 总任务会先执行该动作，让相机进入可识别视角
  pre_detect_nav_02_right:
    type: "joints"
    joints_rad: [4.680, 2.168, 5.653, 2.359, 3.141]
    speed_rad_s: 3.14
    timeout_s: 8.0

  # 点位 03 的左侧预识别窗口
