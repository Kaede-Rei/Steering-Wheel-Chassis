      timeout_s: 20.00
      pre_move_action: "noop"
      # 该点不执行到位后的视觉和机械臂任务
      arrival_jobs: []

    # 前进点 12
    # 区域 AREA_C
    # C 区作业点，每个点执行一个 arrival_job，每个 job 最多处理 2 朵雌花
    - id: "area_c_12_mid"
      nav_index: 12
      x: 0.83
