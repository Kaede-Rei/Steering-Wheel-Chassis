      timeout_s: 20.00
      pre_move_action: "noop"
      # 该点不执行到位后的视觉和机械臂任务
      arrival_jobs: []

    # 前进点 7
    # 区域 AREA_B
    # B 区作业点，每个点执行两个 arrival_jobs，每个 job 最多处理 3 朵雌花
    - id: "area_b_07_right"
      nav_index: 7
      x: 1.87
      y: -0.89
      yaw: 0.00
      area: "AREA_B"
      timeout_s: 20.00
      pre_move_action: "noop"
      # 到位后依次执行以下作业 job
      # 每个 job 先执行 prepare_action 到预识别位姿，再按 task 的视觉授粉模板处理目标
      arrival_jobs:
        # 作业 job 1
        - id: "area_b_07_right_job_1"
          prepare_action: "pre_detect_nav_07_left"
          task: "visual_pollination_b_0_3"
        # 作业 job 2
        - id: "area_b_07_right_job_2"
          prepare_action: "pre_detect_nav_07_right"
          task: "visual_pollination_b_0_3"

    # 前进点 8
    # 区域 AREA_B
    # B 区作业点，每个点执行两个 arrival_jobs，每个 job 最多处理 3 朵雌花
    - id: "area_b_08_right"
      nav_index: 8
      x: 1.27
      y: -0.89
      yaw: 0.00
      area: "AREA_B"
      timeout_s: 20.00
      pre_move_action: "noop"
      # 到位后依次执行以下作业 job
      # 每个 job 先执行 prepare_action 到预识别位姿，再按 task 的视觉授粉模板处理目标
      arrival_jobs:
        # 作业 job 1
        - id: "area_b_08_right_job_1"
          prepare_action: "pre_detect_nav_08_left"
          task: "visual_pollination_b_0_3"
        # 作业 job 2
        - id: "area_b_08_right_job_2"
          prepare_action: "pre_detect_nav_08_right"
          task: "visual_pollination_b_0_3"

    # 前进点 9
    # 区域 AREA_B
    # B 区作业点，每个点执行两个 arrival_jobs，每个 job 最多处理 3 朵雌花
    - id: "area_b_09_right"
      nav_index: 9
      x: 0.74
