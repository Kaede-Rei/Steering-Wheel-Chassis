  # 返航路线点列表
  # 只有 return_home_enabled 为 true 时才会执行
  # 返航点同样使用任务相对坐标
  return_waypoints:

    # 返航点 1
    # 区域 PASS_BY
    # 过渡点，只执行底盘移动，arrival_jobs 保持为空
    - id: "return_pass"
      x: 0.35
      y: -1.65
      yaw: 0.00
      area: "PASS_BY"
      timeout_s: 30.00
      pre_move_action: "noop"
      arrival_jobs: []

    # 返航点 2
    # 区域 START_END
    # 起终点，只用于回到任务起点
    - id: "return_home"
      x: 0.01
      y: 0.03
      yaw: 0.00
      area: "START_END"
      timeout_s: 30.00
      pre_move_action: "noop"
      arrival_jobs: []
