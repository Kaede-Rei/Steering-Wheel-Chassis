      # 到位后依次执行以下作业 job
      # 每个 job 先执行 prepare_action 到预识别位姿，再按 task 的视觉授粉模板处理目标
      arrival_jobs:
        # 作业 job 1
        - id: "area_b_09_right_job_1"
          prepare_action: "pre_detect_nav_09_left"
